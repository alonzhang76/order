    <!-- 新增开票记录模态框 -->
    <div id="invoiceModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-semibold text-gray-800">新增开票记录</h3>
                    <button class="text-gray-500 hover:text-gray-700" onclick="closeModal('invoiceModal')">
                        <span class="text-2xl">✕</span>
                    </button>
                </div>
                <form id="invoiceForm" onsubmit="saveInvoiceRecord(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">客户 <span class="text-red-500">*</span></label>
                            <input type="text" id="invoiceCustomer" name="customer" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">订单号 <span class="text-red-500">*</span></label>
                            <input type="text" id="invoiceOrderNo" name="orderNo" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">运编号 <span class="text-red-500">*</span></label>
                            <input type="text" id="invoiceShipmentNo" name="shipmentNo" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">付款单位 <span class="text-red-500">*</span></label>
                            <input type="text" id="invoicePayer" name="payer" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">收款单位 <span class="text-red-500">*</span></label>
                            <input type="text" id="invoicePayee" name="payee" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">收汇总额 <span class="text-red-500">*</span></label>
                            <input type="number" id="invoiceReceiptTotal" name="receiptTotal" class="form-input" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">开票日期 <span class="text-red-500">*</span></label>
                            <input type="date" id="invoiceDate" name="invoiceDate" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">开票数量 <span class="text-red-500">*</span></label>
                            <input type="number" id="invoiceQuantity" name="quantity" class="form-input" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">开票单价 <span class="text-red-500">*</span></label>
                            <input type="number" id="invoiceUnitPrice" name="unitPrice" class="form-input" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">开票金额 <span class="text-red-500">*</span></label>
                            <input type="number" id="invoiceAmount" name="amount" class="form-input" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">代理费 <span class="text-red-500">*</span></label>
                            <input type="number" id="invoiceAgentFee" name="agentFee" class="form-input" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">国内运杂费 <span class="text-red-500">*</span></label>
                            <input type="number" id="invoiceDomesticFreight" name="domesticFreight" class="form-input" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">海外运杂费 <span class="text-red-500">*</span></label>
                            <input type="number" id="invoiceOverseasFreight" name="overseasFreight" class="form-input" required min="0" step="0.01">
                        </div>
                    </div>
                    <div class="form-group mt-4">
                        <label class="form-label">备注</label>
                        <textarea id="invoiceRemark" name="remark" class="form-input" rows="3"></textarea>
                    </div>
                    <div class="flex justify-end gap-2 mt-6">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('invoiceModal')">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
