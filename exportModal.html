    <div id="exportModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-semibold text-gray-800">新增出口记录</h3>
                    <button class="text-gray-500 hover:text-gray-700" onclick="closeModal('exportModal')">
                        <span class="text-2xl">✕</span>
                    </button>
                </div>
                <form id="exportForm" onsubmit="saveExportRecord(event)">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- 第一行：出货日期、运编号 -->
                        <div class="form-group">
                            <label class="form-label">出货日期</label>
                            <input type="date" id="exportDate" name="exportDate" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">运编号</label>
                            <input type="text" id="exportShipment" name="shipmentNo" class="form-input">
                        </div>
                        <div class="form-group hidden"></div>
                        
                        <!-- 第二行：订单号 -->
                        <div class="form-group md:col-span-3">
                            <label class="form-label">订单号 <span class="text-red-500">*</span></label>
                            <input type="text" id="exportOrder" name="orderNo" class="form-input" required>
                        </div>
                        
                        <!-- 第三行：客户、报关金额、到港日期 -->
                        <div class="form-group">
                            <label class="form-label">客户 <span class="text-red-500">*</span></label>
                            <input type="text" id="exportCustomer" name="customer" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">报关金额</label>
                            <input type="number" id="exportDeclarationAmount" name="declarationAmount" class="form-input" min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">到港日期</label>
                            <input type="date" id="exportArrivalDate" name="arrivalDate" class="form-input">
                        </div>
                        
                        <!-- 其他必要字段 -->
                        <div class="form-group">
                            <label class="form-label">合同号 <span class="text-red-500">*</span></label>
                            <input type="text" id="exportContract" name="contractNo" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">品名 <span class="text-red-500">*</span></label>
                            <input type="text" id="exportProduct" name="productName" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">数量 <span class="text-red-500">*</span></label>
                            <input type="number" id="exportQuantity" name="quantity" class="form-input" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">单位</label>
                            <input type="text" id="exportUnit" name="unit" class="form-input" value="只">
                        </div>
                        <div class="form-group">
                            <label class="form-label">总金额 <span class="text-red-500">*</span></label>
                            <input type="number" id="exportAmount" name="amount" class="form-input" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">币种</label>
                            <select id="exportCurrency" name="currency" class="form-input">
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                                <option value="CNY" selected>CNY</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">目的地</label>
                            <input type="text" id="exportDestination" name="destination" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">代理公司</label>
                            <input type="text" id="exportAgent" name="agentCompany" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">船名航次</label>
                            <input type="text" id="exportVessel" name="vesselVoyage" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">集装箱号封号</label>
                            <input type="text" id="exportContainer" name="containerSeal" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">提单号</label>
                            <input type="text" id="exportBillNo" name="billNo" class="form-input">
                        </div>
                    </div>
                    <div class="form-group mt-4">
                        <label class="form-label">备注</label>
                        <textarea id="exportRemark" name="remark" class="form-input" rows="3" style="resize: both;"></textarea>
                    </div>
                    <div class="flex justify-end gap-2 mt-6">
                        <button type="button" class="btn btn-secondary" onclick="closeModal('exportModal')">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
